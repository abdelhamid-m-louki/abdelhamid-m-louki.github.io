<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="مقال — جمعية سنابل للغة العربية">
  <title>جمعية سنابل — تحميل...</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <style>
    .post-hero {
      position: relative;
      height: 400px;
      overflow: hidden;
      background: linear-gradient(135deg, var(--primary), var(--primary-mid));
    }
    .post-hero-img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.35;
    }
    .post-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 20%, rgba(0,0,0,0.85) 100%);
    }
    .post-hero-content {
      position: absolute;
      bottom: 0;
      right: 0;
      left: 0;
      padding: var(--space-8) var(--space-6);
      max-width: 860px;
      margin-inline: auto;
    }
    .post-hero-badges { display: flex; gap: var(--space-2); margin-bottom: var(--space-4); flex-wrap: wrap; }
    .post-hero-title {
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 800;
      color: white;
      line-height: 1.3;
    }
    .post-meta-bar {
      background: var(--glass-bg-strong);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-5);
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text-secondary);
      margin: var(--space-6) auto;
      max-width: 720px;
    }
    .meta-item { display: flex; align-items: center; gap: var(--space-2); }
    .meta-item svg { width: 16px; height: 16px; color: var(--gold); }
    .post-body {
      max-width: 720px;
      margin-inline: auto;
      padding: 0 var(--space-6);
      font-size: 18px;
      line-height: 1.9;
      color: var(--text-primary);
    }
    .post-body p { margin-bottom: var(--space-5); }
    .post-body blockquote {
      border-right: 4px solid var(--gold);
      padding-right: var(--space-5);
      color: var(--text-secondary);
      font-style: italic;
      margin: var(--space-6) 0;
    }
    .event-info-block {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      border-right: 4px solid var(--gold);
      padding: var(--space-5) var(--space-6);
      margin-bottom: var(--space-6);
    }
    .event-info-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
      font-size: 15px;
      color: var(--text-secondary);
    }
    .event-info-row svg { width: 18px; height: 18px; color: var(--gold); flex-shrink: 0; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-3);
      margin: var(--space-8) 0;
    }
    .gallery-item {
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform var(--transition-base);
    }
    .gallery-item:hover img { transform: scale(1.05); }
    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(0);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all var(--transition-fast);
    }
    .gallery-item:hover .gallery-item-overlay {
      opacity: 1;
      backdrop-filter: blur(2px);
    }
    .related-card {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: var(--space-3) var(--space-4);
      text-decoration: none;
      transition: all var(--transition-fast);
    }
    .related-card:hover { background: var(--glass-bg-hover); transform: translateX(-2px); }
    .related-thumb {
      width: 80px; height: 60px;
      border-radius: var(--radius-xs);
      object-fit: cover;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--primary-light), rgba(255,255,255,0.5));
    }
    .nav-posts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      max-width: 720px;
      margin-inline: auto;
      padding: 0 var(--space-6) var(--space-10);
    }
    @media (max-width: 767px) {
      .post-hero { height: 280px; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .nav-posts { grid-template-columns: 1fr; }
      .post-meta-bar { gap: var(--space-3); }
    }
  </style>
  <!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
</head>
<body>
  <div class="page-bg">
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>

    <div id="navbar-container"></div>

    <main id="main-content" class="page-content" role="main">

      <div id="post-loading" aria-live="polite" style="padding:var(--space-20);text-align:center;color:var(--text-muted)">
        <i data-lucide="loader-2" style="width:48px;height:48px;animation:spin 1s linear infinite" aria-hidden="true"></i>
        <p style="margin-top:var(--space-4)">جارٍ التحميل...</p>
      </div>

      <div id="post-content" style="display:none">

        <!-- Hero -->
        <div class="post-hero" id="postHero">
          <img id="postHeroImg" class="post-hero-img" src="" alt="" loading="lazy">
          <div class="post-hero-overlay"></div>
          <div class="post-hero-content">
            <div class="post-hero-badges" id="postBadges"></div>
            <h1 class="post-hero-title" id="postTitle"></h1>
          </div>
        </div>

        <!-- Meta bar -->
        <div class="post-meta-bar" id="postMeta"></div>

        <!-- Event info block -->
        <div class="container-sm" style="padding-top:0">
          <div class="event-info-block" id="eventInfoBlock" style="display:none">
            <div id="eventInfoContent"></div>
            <a href="join.html" class="btn btn-gold" style="margin-top:var(--space-3)">
              <i data-lucide="user-check" aria-hidden="true"></i>
              سجل حضورك
            </a>
          </div>
        </div>

        <!-- Body -->
        <div class="post-body" id="postBody"></div>

        <!-- Gallery -->
        <div class="container-sm" id="gallerySection" style="display:none">
          <div class="section-header" style="margin-top:var(--space-8)">
            <i data-lucide="images" class="section-header-icon" aria-hidden="true"></i>
            <h2 class="section-title">معرض الصور</h2>
          </div>
          <div class="gallery-grid" id="galleryGrid"></div>
        </div>

        <!-- Related -->
        <div class="container-sm" id="relatedSection" style="display:none;margin-top:var(--space-8)">
          <div class="section-header">
            <i data-lucide="layout-list" class="section-header-icon" aria-hidden="true"></i>
            <h2 class="section-title">مقالات مشابهة</h2>
          </div>
          <div id="relatedGrid" style="display:flex;flex-direction:column;gap:var(--space-3)"></div>
        </div>

        <!-- Navigation -->
        <div class="nav-posts" aria-label="التنقل بين المقالات">
          <a id="prevPost" href="#" class="btn btn-secondary" style="justify-content:center">
            <i data-lucide="chevron-right" aria-hidden="true"></i>
            المقال السابق
          </a>
          <a id="nextPost" href="#" class="btn btn-secondary" style="justify-content:center">
            المقال التالي
            <i data-lucide="chevron-left" aria-hidden="true"></i>
          </a>
        </div>

      </div>

      <div id="post-error" style="display:none">
        <div class="empty-state">
          <i data-lucide="file-x" class="empty-state-icon"></i>
          <p class="empty-state-title">لم يُعثر على المحتوى</p>
          <p class="empty-state-text">المحتوى الذي تبحث عنه غير موجود أو تم حذفه.</p>
          <a href="index.html" class="btn btn-primary">العودة إلى الرئيسية</a>
        </div>
      </div>

    </main>

    <div id="footer-container"></div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="assets/js/app.js"></script>

  <script src="assets/js/components/navbar.js"></script>
  <script src="assets/js/components/footer.js"></script>
  <script src="assets/js/components/lightbox.js"></script>
  <script src="assets/js/pages/post.js"></script>
</body>
</html>
